<!DOCTYPE html>
<html>

<head>

<title>HMI Tanque IoT</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196f3">
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.panel{
background:white;
width:500px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

/* LEDs */
.led{
width:40px;
height:40px;
border-radius:50%;
display:inline-block;
margin:10px;
background:gray;
}

/* Botón activo */
.activo{
background-color:#4CAF50;
color:white;
}

</style>

</head>

<body>

<div class="panel">

<h2>Tanque IoT</h2>

<p>Nivel actual: <span id="nivel">0</span>%</p>

<!-- LEDs -->
<h3>Estado del sistema</h3>
<div id="ledVerde" class="led"></div>
<div id="ledRojo" class="led"></div>

<!-- ⏱️ Hora programada -->
<p>Paro programado: <span id="horaParo">--:--</span></p>

<h3>Control</h3>

<button id="btnStart" onclick="startSistema()">START</button>
<button id="btnParo" onclick="paroEmergencia()">PARO DE EMERGENCIA</button>
<button id="btnAuto" onclick="paroPorHora()">PARO POR HORA</button>

<br><br>

<canvas id="grafica"></canvas>

</div>

<script>

// -------- URL --------
const urlDatos = "https://script.google.com/macros/s/AKfycbzOhTu018VATyRCRYkf4OWqlrngQ3AKleDSkyQUGgGQIIfw-_7B6F62M1L_hOXvMs8W/exec";


// -------- GRAFICA --------
async function cargarDatos(){

let response = await fetch(urlDatos);
let data = await response.json();

let tiempo = [];
let nivel = [];

data.forEach(d => {
tiempo.push(new Date(d.fecha).toLocaleTimeString());
nivel.push(d.porcentaje);
});

document.getElementById("nivel").innerHTML =
nivel[nivel.length-1];

new Chart(document.getElementById("grafica"),{
type:"line",
data:{
labels: tiempo,
datasets:[{
label:"Nivel tanque (%)",
data:nivel,
borderColor:"blue",
fill:false
}]
}
});

}


// -------- ACTUALIZAR ESTADO --------
function actualizarEstado(respuesta){

let partes = respuesta.split(",");

let estado = partes[0].trim();
let hora = partes[1];

// LEDs
let verde = document.getElementById("ledVerde");
let rojo = document.getElementById("ledRojo");

if(estado === "MANUAL" || estado === "AUTO"){
verde.style.background = "green";
rojo.style.background = "gray";
}else{
verde.style.background = "gray";
rojo.style.background = "red";
}

// Hora
document.getElementById("horaParo").innerHTML = hora ? hora : "--:--";

// Botones activos
document.getElementById("btnStart").classList.remove("activo");
document.getElementById("btnParo").classList.remove("activo");
document.getElementById("btnAuto").classList.remove("activo");

if(estado === "MANUAL"){
document.getElementById("btnStart").classList.add("activo");
}
else if(estado === "AUTO"){
document.getElementById("btnAuto").classList.add("activo");
}
else{
document.getElementById("btnParo").classList.add("activo");
}

}


// -------- OBTENER ESTADO --------
function obtenerEstado(){

fetch(urlDatos + "?control=1")
.then(res => res.text())
.then(data => actualizarEstado(data));

}


// -------- BOTONES --------

function startSistema(){
fetch(urlDatos + "?estado=MANUAL");
}

function paroEmergencia(){
fetch(urlDatos + "?estado=OFF");
}

function paroPorHora(){

let hora = prompt("Ingresa hora (HH:MM)");

if(!hora) return;

let ahora = new Date();
let [h,m] = hora.split(":");

let paro = new Date();
paro.setHours(h,m,0);

if(paro <= ahora){
alert("❌ Hora inválida (ya pasó)");
return;
}

fetch(urlDatos + "?estado=AUTO&hora=" + hora);
}


// -------- INICIO --------
cargarDatos();
obtenerEstado();

// 🔄 Actualización continua
setInterval(obtenerEstado, 3000);


// -------- SERVICE WORKER --------
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>

</html>
