<!DOCTYPE html>
<html>

<head>

<title>HMI Tanque IoT</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196f3">
  
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.panel{
background:white;
width:500px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

/* LEDs */
.led{
width:40px;
height:40px;
border-radius:50%;
display:inline-block;
margin:10px;
background:gray;
}

</style>

</head>

<body>

<div class="panel">

<h2>Tanque IoT</h2>

<p>Nivel actual: <span id="nivel">0</span>%</p>

<!-- LEDs -->
<h3>Estado del sistema</h3>
<div id="ledVerde" class="led"></div>
<div id="ledRojo" class="led"></div>

<h3>Control</h3>

<button onclick="startSistema()">START</button>
<button onclick="paroEmergencia()">PARO DE EMERGENCIA</button>
<button onclick="paroPorHora()">PARO POR HORA</button>

<br><br>

<canvas id="grafica"></canvas>

</div>

<script>

// -------- URL --------
const urlDatos = "https://script.google.com/macros/s/AKfycbzOhTu018VATyRCRYkf4OWqlrngQ3AKleDSkyQUGgGQIIfw-_7B6F62M1L_hOXvMs8W/exec";


// -------- GRAFICA --------

async function cargarDatos(){

let response = await fetch(urlDatos);
let data = await response.json();

let tiempo = [];
let nivel = [];

data.forEach(d => {
tiempo.push(new Date(d.fecha).toLocaleTimeString());
nivel.push(d.porcentaje);
});

document.getElementById("nivel").innerHTML =
nivel[nivel.length-1];

new Chart(document.getElementById("grafica"),{
type:"line",
data:{
labels: tiempo,
datasets:[{
label:"Nivel tanque (%)",
data:nivel,
borderColor:"blue",
fill:false
}]
}
});

}


// -------- LEDS --------

function actualizarLEDs(estado){

estado = estado.trim(); // 🔥 CORRECCIÓN CLAVE

let verde = document.getElementById("ledVerde");
let rojo = document.getElementById("ledRojo");

if(estado === "ON"){
verde.style.background = "green";
rojo.style.background = "gray";
}else{
verde.style.background = "gray";
rojo.style.background = "red";
}

}


// -------- OBTENER ESTADO AUTOMÁTICO --------

function obtenerEstado(){

fetch(urlDatos + "?control=1")
.then(res => res.text())
.then(estado => actualizarLEDs(estado));

}


// -------- BOTONES --------

function startSistema(){

fetch(urlDatos + "?estado=ON")
.then(res => res.text())
.then(data => actualizarLEDs(data));

}

function paroEmergencia(){

fetch(urlDatos + "?estado=OFF")
.then(res => res.text())
.then(data => actualizarLEDs(data));

}

function paroPorHora(){

let hora = prompt("Ingresa hora (HH:MM)");

if(!hora) return;

let ahora = new Date();
let [h,m] = hora.split(":");

let paro = new Date();
paro.setHours(h,m,0);

if(paro <= ahora){
alert("❌ Hora inválida (ya pasó)");
return;
}

fetch(urlDatos + "?estado=SCHEDULED&hora=" + hora)
.then(res => res.text())
.then(data => actualizarLEDs(data));

}


// -------- INICIO --------

cargarDatos();
obtenerEstado();

// 🔄 Actualiza cada 3 segundos
setInterval(obtenerEstado, 3000);


// -------- SERVICE WORKER --------

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}

</script>

</body>

</html>
